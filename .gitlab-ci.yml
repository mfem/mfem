  trigger:
    include:
      - local: '.gitlab/custom-jobs.yml'
      - component: $CI_SERVER_FQDN/radiuss/radiuss-shared-ci/tioga-pipeline@2026.6.0
        inputs:
          job_cmd: $JOB_CMD
          shared_alloc: $TIOGA_SHARED_ALLOC
          job_alloc: $TIOGA_JOB_ALLOC
          alloc_name: $ALLOC_NAME
          github_project_name: $GITHUB_PROJECT_NAME
          github_project_org: $GITHUB_PROJECT_ORG
          llnl_service_user: $LLNL_SERVICE_USER
      - artifact: 'tioga-jobs.yml'
        job: 'generate-job-lists'
    strategy: depend
    forward:
      pipeline_variables: true


