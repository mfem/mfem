#  в”‚    в”‚    в”њв”Ђв”Ђ <used files>
#  в”‚    в”‚    в”‚    в””в”Ђв”Ђ .gitlab/scripts/report_build_and_test  [by .report_job_*]
#  в”‚    в”‚    в””в”Ђв”Ђ <used variables>
#  в”‚    в”‚         в”њв”Ђв”Ђ SPEC
#  в”‚    в”‚         в”њв”Ђв”Ђ BUILD_ROOT
#  в”‚    в”‚         в””в”Ђв”Ђ ...
#  в”‚    в”њв”Ђв”Ђ custom-variables.yml
#  в”‚    в”‚    в”њв”Ђв”Ђ <used files>
#  в”‚    в”‚    в”‚    в””в”Ђв”Ђ tests/gitlab/build_and_test  [in JOB_CMD]
#  в”‚    в”‚    в””в”Ђв”Ђ <defined variables>
#  в”‚    в”‚         в”њв”Ђв”Ђ JOB_CMD
#  в”‚    в”‚         в”њв”Ђв”Ђ BUILD_ROOT
#  в”‚    в”‚         в”њв”Ђв”Ђ ALLOC_NAME
