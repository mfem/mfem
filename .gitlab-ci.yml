#  в”‚    в”‚    в”‚         в”њв”Ђв”Ђ CI_PROJECT_DIR
#  в”‚    в”‚    в”‚         в”њв”Ђв”Ђ CI_PIPELINE_URL
#  в”‚    в”‚    в”‚         в”њв”Ђв”Ђ AUTOTEST_COMMIT
#  в”‚    в”‚    в”‚         в””в”Ђв”Ђ CI_MACHINE
#  в”‚    в”‚    в””в”Ђв”Ђ safe_create_rundir
#  в”‚    в”њв”Ђв”Ђ custom-jobs.yml
#  в”‚    в”‚    в”њв”Ђв”Ђ <jobs>
