#  в”‚    в”‚         в”њв”Ђв”Ђ TESTS_REPO
#  в”‚    в”‚         в”њв”Ђв”Ђ AUTOTEST_REPO
#  в”‚    в”‚         в”њв”Ђв”Ђ MFEM_DATA_REPO
#  в”‚    в”‚         в”њв”Ђв”Ђ ARTIFACTS_DIR: artifacts
#  в”‚    в”‚         в”њв”Ђв”Ђ SLURM_OVERLAP: 1
#  в”‚    в”‚         в”њв”Ђв”Ђ DANE_SHARED_ALLOC
#  в”‚    в”‚         в”њв”Ђв”Ђ DANE_JOB_ALLOC
#  в”‚    в”‚         в”њв”Ђв”Ђ TIOGA_SHARED_ALLOC
#  в”‚    в”‚         в”њв”Ђв”Ђ TIOGA_JOB_ALLOC
#  в”‚    в”‚         в””в”Ђв”Ђ MATRIX_JOB_ALLOC
#  в”‚    в””в”Ђв”Ђ dane-baseline.yml
#  в”‚         в”њв”Ђв”Ђ <jobs>
#  в”‚         в”‚    в”њв”Ђв”Ђ .on_dane
#  в”‚         в”‚    в”њв”Ђв”Ђ baselinecheck_mfem_intel_dane
#  в”‚         в”‚    в”њв”Ђв”Ђ cleanup
#  в”‚         в”‚    в”њв”Ђв”Ђ report_baseline
#  в”‚         в”‚    в””в”Ђв”Ђ baselinepublish_mfem_dane
#  в”‚         в”њв”Ђв”Ђ <included and used files>
#  в”‚         в”‚    в”њв”Ђв”Ђ .gitlab/custom-variables.yml
#  в”‚         в”‚    в”њв”Ђв”Ђ .gitlab/configs/setup-baseline.yml
#  в”‚         в”‚    в”њв”Ђв”Ђ .gitlab/scripts/rebaseline
#  в”‚         в”‚    в”њв”Ђв”Ђ .gitlab/scripts/baseline
#  в”‚         в”‚    в””в”Ђв”Ђ .gitlab/scripts/git_try_to_push
#  в”‚         в”њв”Ђв”Ђ <defined variables>
#  в”‚         в”‚    в”њв”Ђв”Ђ BASELINE_TEST: baseline
#  в”‚         в”‚    в”њв”Ђв”Ђ MACHINE_NAME: dane
#  в”‚         в”‚    в”њв”Ђв”Ђ TPLS_DIR
#  в”‚         в”‚    в””в”Ђв”Ђ export MFEM_TEST_NP
#  в”‚         в””в”Ђв”Ђ <used variables>
#  в”‚              в”њв”Ђв”Ђ ON_DANE
#  в”‚              в”њв”Ђв”Ђ AUTOTEST       [defined by .gitlab-ci.yml]
#  в”‚              в”њв”Ђв”Ђ BUILD_ROOT     [defined by custom-variables.yml]
#  в”‚              в”њв”Ђв”Ђ TPLS_DIR       [defined by this file]
#  в”‚              в”њв”Ђв”Ђ ARTIFACTS_DIR  [defined by custom-variables.yml]
#  в”‚              в”њв”Ђв”Ђ MACHINE_NAME   [defined by this file]
#  в”‚              в”њв”Ђв”Ђ AUTOTEST_COMMIT  [defined by .gitlab-ci.yml]
#  в”‚              в”њв”Ђв”Ђ AUTOTEST_ROOT  [defined by .gitlab-ci.yml]
#  в”‚              в”њв”Ђв”Ђ BASELINE_TEST  [defined by this file]
#  в”‚              в””в”Ђв”Ђ REBASELINE     [defined by .gitlab-ci.yml]
#  в””в”Ђв”Ђ tests
#       в”њв”Ђв”Ђ gitlab
#       в”‚    в”њв”Ђв”Ђ build_and_test
#       в”‚    в”‚    в”њв”Ђв”Ђ <builds and tests a given MFEM spec with uberenv>
#       в”‚    в”‚    в”њв”Ђв”Ђ <used files>
#       в”‚    в”‚    в”‚    в”њв”Ђв”Ђ tests/uberenv/uberenv.py        [deps mode, cloned]
#       в”‚    в”‚    в”‚    в””в”Ђв”Ђ tests/gitlab/get_mfem_uberenv   [deps mode]
#       в”‚    в”‚    в””в”Ђв”Ђ <used variables>
#       в”‚    в”‚         в”њв”Ђв”Ђ SYS_TYPE
#       в”‚    в”‚         в”њв”Ђв”Ђ THREADS      [num. parallel jobs to build MFEM]
#       в”‚    в”‚         в”њв”Ђв”Ђ MODULE_LIST  [modules to load]
#       в”‚    в”‚         в”њв”Ђв”Ђ CI_JOB_ID
#       в”‚    в”‚         в”њв”Ђв”Ђ USE_DEV_SHM
#       в”‚    в”‚         в”њв”Ђв”Ђ SPACK_DEBUG
#       в”‚    в”‚         в”њв”Ђв”Ђ DEBUG_MODE
#       в”‚    в”‚         в”њв”Ђв”Ђ REGISTRY_TOKEN
#       в”‚    в”‚         в”њв”Ђв”Ђ CI_REGISTRY_USER  (defined by Gitlab)
#       в”‚    в”‚         в”њв”Ђв”Ђ USER
#       в”‚    в”‚         в”њв”Ђв”Ђ CI_REGISTRY_IMAGE (defined by Gitlab)
#       в”‚    в”‚         в””в”Ђв”Ђ CI_JOB_TOKEN      (defined by Gitlab)
#       в”‚    в”њв”Ђв”Ђ build_and_test_setup
#       в”‚    в”‚    в”њв”Ђв”Ђ <updates MFEM_DATA_REPO and AUTOTEST_REPO using locks>
#       в”‚    в”‚    в””в”Ђв”Ђ <used variables>
#       в”‚    в”‚         в”њв”Ђв”Ђ MFEM_DATA_REPO
#       в”‚    в”‚         в”њв”Ђв”Ђ SHARED_REPOS_DIR
#       в”‚    в”‚         в”њв”Ђв”Ђ AUTOTEST_REPO
#       в”‚    в”‚         в””в”Ђв”Ђ AUTOTEST_ROOT
#       в”‚    в””в”Ђв”Ђ get_mfem_uberenv
#       в”‚         в”њв”Ђв”Ђ <github.com/mfem/mfem-uberenv.git -> tests/uberenv>
#       в”‚         в””в”Ђв”Ђ <defines the uberenv hash to use>
#       в””в”Ђв”Ђ uberenv  [cloned by tests/gitlab/get_mfem_uberenv]
#            в””в”Ђв”Ђ uberenv.py
#
# <radiuss/radiuss-shared-ci components, ref: '2026.6.0'>
#  Included as GitLab CI components (see 'include:' blocks below).
#  Pipelines: base-pipeline, dane-pipeline, tioga-pipeline,
#             matrix-pipeline. MFEM interacts via the 'inputs:'
#             passed in each include; machine on/off and force-all
#             behavior come from project CI/CD variables
#             (ON_DANE/ON_MATRIX/ON_TIOGA, ALL_TARGETS).
#  Source/inputs: https://github.com/LLNL/radiuss-shared-ci

###############################################################################
# We define the following GitLab pipeline variables:
variables:
##### LC GITLAB CONFIGURATION
  CUSTOM_CI_BUILDS_DIR: "/usr/workspace/mfem/gitlab-runner"

##### PROJECT VARIABLES
  USER_CI_TOP_DIR: "${CUSTOM_CI_BUILDS_DIR}/${GITLAB_USER_LOGIN}"
  SHARED_REPOS_DIR: "${USER_CI_TOP_DIR}/repos"
  AUTOTEST_ROOT: "${SHARED_REPOS_DIR}"
  MFEM_DATA_DIR: "${SHARED_REPOS_DIR}/mfem-data"
# AUTOTEST: enable (ON/YES) or disable (any other value) test reporting. See
# also AUTOTEST_COMMIT.
  AUTOTEST: "OFF"
# AUTOTEST_COMMIT: used only when AUTOTEST is set to ON/YES.
# * If AUTOTEST_COMMIT is set to ON/YES, reporting jobs will commit their
#   files to the MFEM/autotest repo.
# * If AUTOTEST_COMMIT is NOT set to ON/YES, reporting jobs will NOT commit
#   their files to the MFEM/autotest repo. Instead they will just show the
#   contents of the report files and remove them.
  AUTOTEST_COMMIT: "ON"
# REBASELINE:
# Defines the default choice for updating the saved baseline results. By default
# the baseline can only be updated from the master branch. This variable offers
# the option to manually ask for rebaselining from another branch if necessary.
  REBASELINE: "OFF"

##### SHARED_CI CONFIGURATION
# Required information about GitHub repository
  GITHUB_PROJECT_NAME: "mfem"
  GITHUB_PROJECT_ORG: "MFEM"
# Override the pattern describing branches that will skip the "draft PR filter
# test". Add protected branches here. See default value in
# utility-draft-pr-filter.
#  ALWAYS_RUN_PATTERN: ""

###############################################################################
##### High level stages
# We organize the build-and-test stage with sub-pipelines. Each sub-pipeline
# corresponds to a test batch on a given machine.
stages:
  - prerequisites
  - build-and-test

###############################################################################
include:
  - component: $CI_SERVER_FQDN/radiuss/radiuss-shared-ci/base-pipeline@2026.6.0
    inputs:
      github_project_name: $GITHUB_PROJECT_NAME
      github_project_org: $GITHUB_PROJECT_ORG
      github_token: $GITHUB_TOKEN
  # [Optional] checks preliminary to running the actual CI test
  #- component: $CI_SERVER_FQDN/radiuss/radiuss-shared-ci/utility-draft-pr-filter@2026.6.0
  #  inputs:
  #    github_token: $GITHUB_TOKEN
  #    github_project_name: $GITHUB_PROJECT_NAME
  #    github_project_org: $GITHUB_PROJECT_ORG
  #    always_run_pattern: $ALWAYS_RUN_PATTERN
  - local: '.gitlab/custom-variables.yml'

###############################################################################
# Subscribed sub-pipelines
###############################################################################
# Trigger a build-and-test pipeline for a machine.
# Comment the jobs for machines you donвЂ™t need.

# One job to generate the job list for all the subpipelines
generate-job-lists:
  stage: prerequisites
  tags: [shell, oslic]
  variables:
    LOCAL_JOBS_PATH: ".gitlab/jobs"
  script:
    - |
      echo "AUTOTEST=$AUTOTEST"
      echo "AUTOTEST_COMMIT=$AUTOTEST_COMMIT"
      echo "AUTOTEST_ROOT=$AUTOTEST_ROOT"
    - |
      cat ${LOCAL_JOBS_PATH}/dane.yml > dane-jobs.yml
      if [[ ${AUTOTEST} == "ON" || ${AUTOTEST} == "YES" ]]
      then
          cat ${LOCAL_JOBS_PATH}/dane-reports.yml >> dane-jobs.yml
      fi
    - |
      cat ${LOCAL_JOBS_PATH}/matrix.yml > matrix-jobs.yml
      if [[ ${AUTOTEST} == "ON" || ${AUTOTEST} == "YES" ]]
      then
          cat ${LOCAL_JOBS_PATH}/matrix-reports.yml >> matrix-jobs.yml
      fi
    - |
      cat ${LOCAL_JOBS_PATH}/tioga.yml > tioga-jobs.yml
      if [[ ${AUTOTEST} == "ON" || ${AUTOTEST} == "YES" ]]
      then
          cat ${LOCAL_JOBS_PATH}/tioga-reports.yml >> tioga-jobs.yml
      fi
  artifacts:
    paths:
      - dane-jobs.yml
      - matrix-jobs.yml
      - tioga-jobs.yml


# DANE
dane-up-check:
  variables:
    ASSOCIATED_CHILD_PIPELINE: "dane-build-and-test"
  extends: [.dane, .machine-check]

dane-build-and-test:
  variables:
    # Explicitly pass down values that are not always propagated to child
    # pipelines, e.g. when a variable is set in the "Settings -> CI" web
    # interface (project variables).
    AUTOTEST: "${AUTOTEST}"
    AUTOTEST_COMMIT: "${AUTOTEST_COMMIT}"
    CUSTOM_CI_BUILDS_DIR: "${CUSTOM_CI_BUILDS_DIR}"
  needs: [dane-up-check, generate-job-lists]
  extends: [.dane, .build-and-test]
  trigger:
    include:
      - local: '.gitlab/custom-jobs.yml'
      - component: $CI_SERVER_FQDN/radiuss/radiuss-shared-ci/dane-pipeline@2026.6.0
        inputs:
          job_cmd: $JOB_CMD
          shared_alloc: $DANE_SHARED_ALLOC
          job_alloc: $DANE_JOB_ALLOC
          alloc_name: $ALLOC_NAME
          github_project_name: $GITHUB_PROJECT_NAME
          github_project_org: $GITHUB_PROJECT_ORG
          llnl_service_user: $LLNL_SERVICE_USER
      - artifact: 'dane-jobs.yml'
        job: 'generate-job-lists'
    strategy: depend
    forward:
      pipeline_variables: true

# DANE, MFEM Specific
dane-baseline:
  stage: build-and-test
  extends: [.dane]
  variables:
    # Explicitly pass down values that are not always propagated to child
    # pipelines, e.g. when a variable is set in the "Settings -> CI" web
    # interface (project variables).
    # Note: in some cases, this does not work as expected, e.g. when the
    # variable is not re-defined in the web interface; in such cases, the child
    # pipeline gets a definition like '${AUTOTEST}', i.e. it behaves as if
    # AUTOTEST is undefined, even though there is a default value in
    # .gitlab-ci.yml.
    AUTOTEST: "${AUTOTEST}"
    AUTOTEST_COMMIT: "${AUTOTEST_COMMIT}"
    CUSTOM_CI_BUILDS_DIR: "${CUSTOM_CI_BUILDS_DIR}"
  trigger:
    include: .gitlab/dane-baseline.yml
    strategy: depend
    forward:
      pipeline_variables: true
  needs: [dane-up-check]


